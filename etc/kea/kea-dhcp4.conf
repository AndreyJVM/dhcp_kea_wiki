{
    "Dhcp4": {
        "lease-database": {
            "type": "postgresql",
            "host": "localhost",
            "port": 5432,
            "name": "kea_db",
            "user": "kea_user",
            "password": "kea_strong_password"
        },

        "interfaces-config": {
            "interfaces": [ "eth0" ]
        },

        "control-socket": {
            "socket-type": "unix",
            "socket-name": "/var/run/kea/control_socket"
        },

        "host-reservation-identifiers": [ "hw-address" ],

        "option-data": [
            {
                "name": "domain-name-servers",
                "data": "8.8.8.8, 1.1.1.1"
            }
        ],

        "subnet4": [
            {
                "id": 1,
                "subnet": "192.168.0.0/24",

                "pools": [
                    {
                        "pool": "192.168.0.201 - 192.168.0.220"
                    }
                ],
                
                "option-data": [
                    {
                        "name": "routers",
                        "data": "192.168.0.1"
                    }
                ]
            }
        ],

        "loggers": [
            {
                "name": "kea-dhcp4",
                "severity": "INFO"
            }
        ]
    }
}
