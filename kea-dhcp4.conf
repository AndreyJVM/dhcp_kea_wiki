{
    "Dhcp4": {
        // Подключаемся к базе данных для хранения аренд
        "lease-database": {
            "type": "mysql",
            "host": "localhost",
            "port": 3306,
            "name": "kea",
            "user": "kea",
            "password": "ваш_надёжный_пароль"
        },

        // Какой сетевой интерфейс слушаем
        "interfaces-config": {
            "interfaces": [ "eth0" ] // замените на свой интерфейс
        },

        // ГЛОБАЛЬНЫЕ РЕЗЕРВИРОВАНИЯ (БЕЛЫЙ СПИСОК MAC)
        // Здесь перечислены все MAC-адреса, которым разрешено получать IP
        "reservations": [
            { "hw-address": "aa:bb:cc:dd:ee:11" },
            { "hw-address": "aa:bb:cc:dd:ee:22" },
            { "hw-address": "aa:bb:cc:dd:ee:33" }
            // ... добавьте сюда все нужные MAC-адреса
        ],

        // Глобальные опции (например, DNS)
        "option-data": [
            {
                "name": "domain-name-servers",
                "data": "8.8.8.8, 1.1.1.1"
            }
        ],

        // Настройки вашей подсети
        "subnet4": [
            {
                "id": 1,
                "subnet": "192.168.0.0/24",
                
                // ВКЛЮЧАЕМ ПРОВЕРКУ ГЛОБАЛЬНЫХ РЕЗЕРВИРОВАНИЙ
                "reservations-global": true,
                // ОТКЛЮЧАЕМ ПРОВЕРКУ РЕЗЕРВИРОВАНИЙ ВНУТРИ ПОДСЕТИ
                "reservations-in-subnet": false,

                // ПУЛ АДРЕСОВ ДЛЯ ДИНАМИЧЕСКОЙ ВЫДАЧИ
                "pools": [
                    {
                        "pool": "192.168.0.201 - 192.168.0.220"
                    }
                ],
                
                "option-data": [
                    {
                        "name": "routers",
                        "data": "192.168.0.1"
                    }
                ]
            }
        ],

        // Настройка логирования
        "loggers": [
            {
                "name": "kea-dhcp4",
                "output-options": [
                    {
                        "output": "stdout"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
