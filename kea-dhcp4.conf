{
    "Dhcp4": {
        // Подключаемся к базе данных, которую вы создали ранее
        "lease-database": {
            "type": "mysql",
            "host": "localhost",
            "port": 3306,
            "name": "kea",
            "user": "kea",
            "password": "ваш_надёжный_пароль"
        },

        // Какой сетевой интерфейс слушаем
        "interfaces-config": {
            "interfaces": [ "eth0" ]
        },

        // Глобальные опции (например, DNS)
        "option-data": [
            {
                "name": "domain-name-servers",
                "data": "8.8.8.8, 1.1.1.1"
            }
        ],

        // Настройки для вашей подсети 192.168.0.0/24
        "subnet4": [
            {
                "id": 1,
                "subnet": "192.168.0.0/24",
                "pools": [
                    {
                        "pool": "192.168.0.100 - 192.168.0.200"
                    }
                ],
                "option-data": [
                    {
                        "name": "routers",
                        "data": "192.168.0.1"
                    }
                ]
            }
        ],

        // Настройка логирования (полезно для отладки)
        "loggers": [
            {
                "name": "kea-dhcp4",
                "output-options": [
                    {
                        "output": "stdout"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
